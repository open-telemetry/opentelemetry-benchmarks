name: Harness (.NET)

on:
  push:
    branches:
      - main
    paths:
      - 'harnesses/dotnet/**'
      - '.github/workflows/harness-dotnet.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'harnesses/dotnet/**'
      - '.github/workflows/harness-dotnet.yml'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read # Checkout the repository

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '8.0.x'

      - name: Build
        working-directory: harnesses/dotnet
        run: dotnet build -c Release OtelBenchmarks.Dotnet

      - name: Dry-run benchmark
        working-directory: harnesses/dotnet/OtelBenchmarks.Dotnet
        run: dotnet run -c Release --no-build -- --filter '*' --job Dry
