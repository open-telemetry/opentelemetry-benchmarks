name: Harness (.NET)

on:
  push:
    branches:
      - main
    paths:
      - 'harnesses/dotnet/**'
      - '.github/workflows/harness-dotnet.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'harnesses/dotnet/**'
      - '.github/workflows/harness-dotnet.yml'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and dry-run
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    permissions:
      contents: read # Checkout the repository

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_GENERATE_ASPNET_CERTIFICATE: false
      DOTNET_NOLOGO: true
      DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
      NUGET_XMLDOC_MODE: skip
      TERM: xterm

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: harnesses/dotnet/global.json

      - name: Build
        working-directory: harnesses/dotnet
        run: dotnet build --configuration Release OpenTelemetry.Benchmarks

      - name: Dry-run benchmark
        working-directory: harnesses/dotnet/OpenTelemetry.Benchmarks
        run: dotnet run --configuration Release --no-build -- --filter '*' --job Dry
